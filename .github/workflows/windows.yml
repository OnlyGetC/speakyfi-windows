name: Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Rust check
        id: rust_check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Rust tests
        id: rust_tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Speakyfi (cloud-only, no local whisper)
        id: tauri_build
        run: cargo tauri build
        working-directory: .
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Generate acceptance checklist report
        if: always()
        run: node scripts/generate-checklist-report.mjs
        env:
          RUST_CHECK_STATUS: ${{ steps.rust_check.outcome }}
          RUST_TEST_STATUS: ${{ steps.rust_tests.outcome }}
          TAURI_BUILD_STATUS: ${{ steps.tauri_build.outcome }}
          DIAGNOSTICS_STATUS: ${{ steps.rust_tests.outcome }}

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: speakyfi-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: speakyfi-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: speakyfi-windows-exe
          path: src-tauri/target/release/speakyfi.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload acceptance checklist report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speakyfi-windows-checklist-report
          path: CHECKLIST_REPORT.md
          retention-days: 30
          if-no-files-found: warn
